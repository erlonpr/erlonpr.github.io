# Name of the workflow as it will appear in the GitHub Actions UI
name: Deploy Next.js site to GitHub Pages

# Define the events that will trigger this workflow
on:
  # The workflow will run every time code is pushed...
  push:
    # ... specifically to the "main" branch
    branches: ["main"]

# Environment variables that apply to all jobs in the workflow
env:
  # Forces all JavaScript-based GitHub Actions to use Node.js version 24
  # This helps prevent deprecation warnings for older Node.js versions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Define the permissions needed by the GitHub token used in this workflow
permissions:
  # Allows reading the repository contents (the code itself)
  contents: read
  # Allows writing/deploying to GitHub Pages
  pages: write
  # Allows the workflow to request a JWT (JSON Web Token) for secure authentication
  id-token: write

# Define the tasks (jobs) that this workflow will execute
jobs:
  # Job 1: Build the Next.js application
  build:
    # The operating system environment where the job will run
    runs-on: ubuntu-latest
    
    # The sequence of tasks (steps) to perform inside this job
    steps:
      # Step 1: Download a copy of your repository code onto the runner
      - name: Checkout
        uses: actions/checkout@v4        
      
      # Step 2: Install pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          
      # Step 3: Install Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24" 
          cache: 'pnpm'      # Enables caching for pnpm to speed up future builds
          
      # Step 4: Install all the project dependencies
      - name: Install dependencies        
        # Use --frozen-lockfile to ensure reproducible builds by strictly following the pnpm-lock.yaml file
        run: pnpm install --frozen-lockfile
        
      # Step 5: Compile and build the Next.js application for production
      - name: Build with Next.js
        run: pnpm build
        
      # Step 6: Package the custom output directory ('out' folder generated by Next.js static export) 
      # and upload it as a GitHub artifact to be used by the deploy job later
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Job 2: Deploy the built application to GitHub Pages
  deploy:
    # Define the deployment environment details
    environment:
      name: github-pages
      # Sets the environment URL to the actual deployed GitHub Pages URL output by the deploy step
      url: ${{ steps.deployment.outputs.page_url }}
      
    # The operating system environment for deployment
    runs-on: ubuntu-latest
    
    # This prevents the deployment from starting until the 'build' job has successfully completed
    needs: build
    
    # Steps to perform for deployment
    steps:
      # Step 1: Take the artifact uploaded previously and publish it to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 